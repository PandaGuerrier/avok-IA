services:
  web:
    container_name: '${COMPOSE_PROJECT_NAME}_web'
    restart: always
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Passé au build pour le frontend (Vite)
        VITE_API_URL: ${VITE_API_URL}
    # Suppression de env_file qui causait l'erreur
    ports:
      - "${PORT:-3333}:3333"
    networks:
      - sail
    depends_on:
      pgsql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3333}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_KEY: ${APP_KEY}
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
      DRIVE_DISK: ${DRIVE_DISK:-fs}
      LIMITER_STORE: ${LIMITER_STORE:-database}
      DB_HOST: ${DB_HOST:-pgsql}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - 'web_uploads:/app/apps/web/build/tmp'

  pgsql:
    image: 'pgvector/pgvector:0.8.0-pg17'
    container_name: '${COMPOSE_PROJECT_NAME}_pgsql'
    # On évite d'exposer le port 5432 sur l'extérieur pour la sécu,
    # sauf si vous en avez besoin pour un client SQL externe.
    ports:
      - '${DB_PORT_EXTERNAL:-5432}:5432'
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'sailpgsql:/var/lib/postgresql/data'
    networks:
      - sail
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USER}' ]
      retries: 5
      timeout: 5s