services:
  web:
    container_name: '${COMPOSE_PROJECT_NAME}_web'
    restart: always
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${PORT:-3333}:3333"
    networks:
      - sail
    depends_on:
      pgsql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3333}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_KEY: ${APP_KEY}
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
      DRIVE_DISK: ${DRIVE_DISK:-fs}
      LIMITER_STORE: ${LIMITER_STORE:-database}
      DB_HOST: ${DB_HOST:-pgsql}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      VITE_API_URL: ${VITE_API_URL}
    volumes:
      - 'web_uploads:/app/apps/web/build/tmp'

  pgsql:
    image: 'pgvector/pgvector:0.8.0-pg17'
    container_name: '${COMPOSE_PROJECT_NAME}_pgsql'
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'sailpgsql:/var/lib/postgresql/data'
    networks:
      - sail
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USER}' ]
      retries: 5
      timeout: 5s
      interval: 10s

  cloudflared-exprefrei:
    image: cloudflare/cloudflared:latest
    container_name: cf_avokia
    command: tunnel run --token ${CF_TOKEN}
    networks:
      - sail
    restart: always

# --- IMPORTANT : Les définitions ci-dessous doivent être à la racine (pas d'espace devant) ---

networks:
  sail:
    driver: bridge

volumes:
  sailpgsql:
  web_uploads: